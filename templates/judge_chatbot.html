<!-- Floating JudgeBot Widget -->
<div id="judgebot-widget" style="position: fixed; bottom: 110px; right: 30px; z-index: 1000;">
    
    <!-- Chat Icon -->
    <button id="judgebot-toggle" style="width: 60px; height: 60px; border-radius: 50%; background: linear-gradient(135deg, #8b5cf6, #6366f1); border: none; box-shadow: 0 4px 15px rgba(139,92,246,0.3); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; transition: transform 0.3s;" onclick="toggleJudgeChat()">
        ⚖️
    </button>

    <!-- Chat Window -->
    <div id="judgebot-window" class="glass-card" style="display: none; position: absolute; bottom: 80px; right: 0; width: 350px; height: 450px; flex-direction: column; padding: 0; overflow: hidden; border: 1px solid #8b5cf6;">
        
        <!-- Header -->
        <div style="background: rgba(139,92,246,0.2); padding: 1rem; border-bottom: 1px solid var(--glass-border); display: flex; align-items: center; gap: 0.8rem;">
            <div style="font-size: 1.5rem;">🤖</div>
            <div>
                <h4 style="margin: 0; font-size: 1rem; color: #fff;">JudgeBot AI</h4>
                <span style="font-size: 0.75rem; color: #c4b5fd;">● Online</span>
            </div>
            <button onclick="toggleJudgeChat()" style="margin-left: auto; background: none; border: none; color: var(--text-secondary); font-size: 1.2rem; cursor: pointer;">✕</button>
        </div>

        <!-- Chat History -->
        <div id="judgebot-messages" style="flex: 1; padding: 1rem; overflow-y: auto; display: flex; flex-direction: column; gap: 1rem; font-size: 0.9rem;">
            <div class="bot-msg" style="align-self: flex-start; background: rgba(139,92,246,0.1); padding: 0.8rem 1rem; border-radius: 12px 12px 12px 0; max-width: 85%; line-height: 1.4;">
                Welcome Judge! ⚖️ I am JudgeBot. I can:
                <br>• Summarize a project (e.g. "Summarize Team Alpha")
                <br>• Suggest scores (e.g. "Evaluate Team Alpha")
                <br>• Generate feedback (e.g. "Feedback for Team Alpha")
                <br>• Compare teams (e.g. "Compare Team A and Team B")
                <br>• Find incomplete submissions
            </div>
        </div>

        <!-- Input Area -->
        <div style="padding: 1rem; border-top: 1px solid var(--glass-border); background: rgba(0,0,0,0.3); display: flex; gap: 0.5rem;">
            <input type="text" id="judgebot-input" placeholder="Type a command..." style="flex: 1; padding: 0.6rem 1rem; border-radius: 20px; border: 1px solid var(--glass-border); background: rgba(255,255,255,0.05); color: #fff; outline: none;" onkeypress="if(event.key === 'Enter') sendJudgeBotMsg()">
            <button onclick="sendJudgeBotMsg()" style="background: #8b5cf6; border: none; width: 36px; height: 36px; border-radius: 50%; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center;">➤</button>
        </div>
    </div>
</div>

<style>
#judgebot-messages::-webkit-scrollbar { width: 6px; }
#judgebot-messages::-webkit-scrollbar-thumb { background: rgba(139,92,246,0.3); border-radius: 3px; }
.judge-user-msg {
    align-self: flex-end;
    background: #8b5cf6;
    color: white;
    padding: 0.8rem 1rem;
    border-radius: 12px 12px 0 12px;
    max-width: 85%;
    line-height: 1.4;
    word-wrap: break-word;
}
.judge-bot-msg {
    align-self: flex-start;
    background: rgba(139,92,246,0.1);
    padding: 0.8rem 1rem;
    border-radius: 12px 12px 12px 0;
    max-width: 85%;
    line-height: 1.4;
    white-space: pre-wrap;
    word-wrap: break-word;
}
</style>

<script>
function toggleJudgeChat() {
    const win = document.getElementById('judgebot-window');
    const btn = document.getElementById('judgebot-toggle');
    if (win.style.display === 'none') {
        win.style.display = 'flex';
        btn.style.transform = 'scale(0.8)';
        document.getElementById('judgebot-input').focus();
    } else {
        win.style.display = 'none';
        btn.style.transform = 'scale(1)';
    }
}

async function sendJudgeBotMsg() {
    const inputField = document.getElementById('judgebot-input');
    const msgBox = document.getElementById('judgebot-messages');
    const msg = inputField.value.trim();
    if (!msg) return;

    inputField.value = '';
    msgBox.innerHTML += `<div class="judge-user-msg">${msg}</div>`;
    msgBox.scrollTop = msgBox.scrollHeight;

    const typingId = 'typing-' + Date.now();
    msgBox.innerHTML += `
        <div id="${typingId}" class="judge-bot-msg" style="padding: 0.5rem 1rem;">
            <div class="typing-indicator"></div><div class="typing-indicator"></div><div class="typing-indicator"></div>
        </div>`;
    msgBox.scrollTop = msgBox.scrollHeight;

    try {
        const response = await fetch('/judge-chatbot/api/', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': '{{ csrf_token }}'
            },
            body: JSON.stringify({ message: msg })
        });
        const data = await response.json();
        
        document.getElementById(typingId).remove();
        
        let reply = data.reply || "Sorry, I encountered an error analyzing the submissions.";
        msgBox.innerHTML += `<div class="judge-bot-msg">${reply}</div>`;
        msgBox.scrollTop = msgBox.scrollHeight;

    } catch (e) {
        document.getElementById(typingId).remove();
        msgBox.innerHTML += `<div class="judge-bot-msg" style="color: #f87171;">Connection error. Please try again.</div>`;
        msgBox.scrollTop = msgBox.scrollHeight;
    }
}
</script>
