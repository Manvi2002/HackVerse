{% extends 'base.html' %}

{% block content %}
<div class="glass-card" style="max-width: 400px; margin: 4rem auto; padding: 2.5rem;">
    <div class="text-center mb-2">
        <h2 style="font-size: 2rem;">Welcome Back</h2>
        <p style="color: var(--text-secondary);">Login to your HackVerse account</p>
    </div>

    <form method="post">
        {% csrf_token %}
        {% for field in form %}
            <div class="form-group">
                <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}
                    <div style="color: #f87171; font-size: 0.8rem; margin-top: 0.3rem;">
                        {{ field.errors }}
                    </div>
                {% endif %}
            </div>
        {% endfor %}
        <button type="submit" class="btn-primary" style="width: 100%; margin-top: 1rem;">Login</button>
    </form>

    <div class="text-center mt-2">
        <p style="color: var(--text-secondary); font-size: 0.9rem;">
            Don't have an account? <a href="{% url 'register' %}" style="color: var(--accent-primary); text-decoration: none;">Sign up here</a>
        </p>
    </div>
</div>

<script>
    // Add custom classes to Django form inputs
    document.querySelectorAll('input').forEach(input => {
        if (input.type !== 'hidden' && input.type !== 'submit') {
            input.classList.add('form-control');
        }
    });
</script>
{% endblock %}
