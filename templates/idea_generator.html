{% extends 'base.html' %}

{% block content %}
<div style="max-width: 900px; margin: 0 auto; padding: 2rem 0;">

    <!-- Header -->
    <div style="text-align: center; margin-bottom: 3rem;">
        <div style="font-size: 3.5rem; margin-bottom: 1rem; animation: float 3s ease-in-out infinite;">🧠</div>
        <h1 style="font-size: 2.8rem; margin-bottom: 0.5rem;">
            AI <span style="color: var(--accent-secondary);">Idea Generator</span>
        </h1>
        <p style="color: var(--text-secondary); font-size: 1.1rem; max-width: 550px; margin: 0 auto;">
            Tell us your hackathon theme and our AI will generate 5 innovative project ideas — complete with problem statements, solutions, and tech stacks.
        </p>
    </div>

    <!-- Input Section -->
    <div class="glass-card" style="padding: 2.5rem; margin-bottom: 2.5rem;">
        <div style="display: flex; gap: 1rem; flex-wrap: wrap; align-items: flex-end;">
            <div style="flex: 1; min-width: 240px;">
                <label style="display: block; font-weight: 600; margin-bottom: 0.6rem; color: var(--text-secondary); font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.07em;">Hackathon Theme</label>
                <input
                    type="text"
                    id="themeInput"
                    placeholder="e.g. AI/ML, Web3, FinTech, Cybersecurity..."
                    style="width: 100%; box-sizing: border-box; padding: 0.9rem 1.2rem; background: rgba(255,255,255,0.06); border: 1px solid var(--glass-border); border-radius: 10px; color: white; font-size: 1rem; font-family: inherit; outline: none; transition: border-color 0.2s;"
                    onfocus="this.style.borderColor='var(--accent-primary)'"
                    onblur="this.style.borderColor='var(--glass-border)'"
                />
            </div>

            <!-- Quick-pick theme pills -->
            <div style="width: 100%; display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 0.3rem;">
                <button onclick="setTheme('AI/ML')" class="theme-pill">AI/ML</button>
                <button onclick="setTheme('Web3')" class="theme-pill">Web3</button>
                <button onclick="setTheme('FinTech')" class="theme-pill">FinTech</button>
                <button onclick="setTheme('Cybersecurity')" class="theme-pill">Cybersecurity</button>
                <button onclick="setTheme('Full Stack')" class="theme-pill">Full Stack</button>
                <button onclick="setTheme('E-Commerce')" class="theme-pill">E-Commerce</button>
                <button onclick="setTheme('Open Innovation')" class="theme-pill">Open Innovation</button>
                <button onclick="setTheme('Health Tech')" class="theme-pill">Health Tech</button>
                <button onclick="setTheme('EdTech')" class="theme-pill">EdTech</button>
                <button onclick="setTheme('Sustainability')" class="theme-pill">Sustainability</button>
            </div>
        </div>

        <button id="generateBtn" onclick="generateIdeas()" class="btn-primary" style="margin-top: 1.5rem; width: 100%; padding: 1rem; font-size: 1.05rem; position: relative; overflow: hidden;">
            <span id="btnText">✨ Generate Ideas</span>
            <span id="btnLoading" style="display:none;">
                <span class="spinner"></span> Thinking...
            </span>
        </button>
    </div>

    <!-- Error banner -->
    <div id="errorBanner" style="display:none; background: rgba(248,113,113,0.12); border: 1px solid rgba(248,113,113,0.3); border-radius: 10px; padding: 1rem 1.5rem; color: #fca5a5; margin-bottom: 1.5rem; font-size: 0.95rem;"></div>

    <!-- Results -->
    <div id="resultsSection" style="display:none;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
            <h2 style="font-size: 1.4rem; margin: 0;">💡 Generated Ideas <span id="themeLabel" style="color: var(--accent-secondary); font-size: 1rem;"></span></h2>
            <button onclick="generateIdeas()" style="background: transparent; border: 1px solid var(--glass-border); color: var(--text-secondary); padding: 0.4rem 1rem; border-radius: 8px; cursor: pointer; font-size: 0.85rem;">🔄 Regenerate</button>
        </div>
        <div id="ideasGrid" class="hackathon-grid"></div>
    </div>
</div>

<style>
@keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
}
@keyframes fadeSlideIn {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
}
.theme-pill {
    padding: 0.3rem 0.85rem;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--glass-border);
    border-radius: 999px;
    color: var(--text-secondary);
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
}
.theme-pill:hover {
    background: rgba(99,102,241,0.15);
    border-color: var(--accent-primary);
    color: white;
}
.idea-card {
    animation: fadeSlideIn 0.5s ease forwards;
    opacity: 0;
    display: flex;
    flex-direction: column;
}
.idea-card:nth-child(1) { animation-delay: 0.05s; }
.idea-card:nth-child(2) { animation-delay: 0.15s; }
.idea-card:nth-child(3) { animation-delay: 0.25s; }
.idea-card:nth-child(4) { animation-delay: 0.35s; }
.idea-card:nth-child(5) { animation-delay: 0.45s; }
.tech-badge {
    display: inline-block;
    padding: 0.2rem 0.6rem;
    background: rgba(99,102,241,0.15);
    border: 1px solid rgba(99,102,241,0.25);
    border-radius: 999px;
    font-size: 0.72rem;
    color: #a5b4fc;
    font-weight: 600;
    margin: 0.2rem 0.2rem 0 0;
}
.spinner {
    display: inline-block;
    width: 16px;
    height: 16px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Skeleton loader */
.skeleton-card {
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--glass-border);
    border-radius: 16px;
    padding: 1.8rem;
    animation: pulse 1.4s ease-in-out infinite;
}
.skeleton-line {
    background: rgba(255,255,255,0.08);
    border-radius: 4px;
    margin-bottom: 0.8rem;
}
@keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
}
</style>

<script>
const COLORS = [
    { icon: '🚀', accent: '#818cf8', border: 'rgba(129,140,248,0.25)', bg: 'rgba(129,140,248,0.06)' },
    { icon: '⚡', accent: '#34d399', border: 'rgba(52,211,153,0.25)', bg: 'rgba(52,211,153,0.06)' },
    { icon: '🔥', accent: '#f472b6', border: 'rgba(244,114,182,0.25)', bg: 'rgba(244,114,182,0.06)' },
    { icon: '🌐', accent: '#fbbf24', border: 'rgba(251,191,36,0.25)', bg: 'rgba(251,191,36,0.06)' },
    { icon: '💎', accent: '#a78bfa', border: 'rgba(167,139,250,0.25)', bg: 'rgba(167,139,250,0.06)' },
];

function setTheme(theme) {
    document.getElementById('themeInput').value = theme;
    document.getElementById('themeInput').focus();
}

function showSkeletons() {
    const grid = document.getElementById('ideasGrid');
    grid.innerHTML = '';
    for (let i = 0; i < 5; i++) {
        grid.innerHTML += `
            <div class="skeleton-card">
                <div class="skeleton-line" style="height:12px; width:40%; margin-bottom:1.2rem;"></div>
                <div class="skeleton-line" style="height:20px; width:80%;"></div>
                <div class="skeleton-line" style="height:20px; width:60%;"></div>
                <div class="skeleton-line" style="height:14px; width:90%; margin-top:0.8rem;"></div>
                <div class="skeleton-line" style="height:14px; width:75%;"></div>
                <div class="skeleton-line" style="height:14px; width:85%;"></div>
                <div style="margin-top:1rem; display:flex; gap:0.4rem; flex-wrap:wrap;">
                    <div class="skeleton-line" style="height:22px; width:60px; border-radius:999px; margin:0;"></div>
                    <div class="skeleton-line" style="height:22px; width:80px; border-radius:999px; margin:0;"></div>
                    <div class="skeleton-line" style="height:22px; width:70px; border-radius:999px; margin:0;"></div>
                </div>
            </div>`;
    }
}

function renderIdeas(ideas, theme) {
    const grid = document.getElementById('ideasGrid');
    grid.innerHTML = '';
    ideas.forEach((idea, i) => {
        const c = COLORS[i % COLORS.length];
        const techBadges = (idea.tech_stack || []).map(t =>
            `<span class="tech-badge">${t}</span>`
        ).join('');
        grid.innerHTML += `
            <div class="glass-card idea-card" style="border-top: 3px solid ${c.accent}; background: ${c.bg}; padding: 1.8rem; flex-direction: column;">
                <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:1rem;">
                    <span style="font-size:0.75rem; font-weight:700; text-transform:uppercase; letter-spacing:0.1em; color:${c.accent};">Idea ${i+1}</span>
                    <span style="font-size:1.8rem;">${c.icon}</span>
                </div>
                <h3 style="font-size:1.15rem; font-weight:800; margin-bottom:1rem; line-height:1.4;">${idea.title}</h3>
                <div style="margin-bottom:0.8rem;">
                    <p style="font-size:0.72rem; font-weight:700; text-transform:uppercase; letter-spacing:0.08em; color:${c.accent}; margin-bottom:0.3rem;">🎯 Problem</p>
                    <p style="color:var(--text-secondary); font-size:0.9rem; line-height:1.6;">${idea.problem}</p>
                </div>
                <div style="margin-bottom:1rem;">
                    <p style="font-size:0.72rem; font-weight:700; text-transform:uppercase; letter-spacing:0.08em; color:${c.accent}; margin-bottom:0.3rem;">💡 Solution</p>
                    <p style="color:var(--text-secondary); font-size:0.9rem; line-height:1.6;">${idea.solution}</p>
                </div>
                <div style="margin-top:auto; padding-top:1rem; border-top:1px solid rgba(255,255,255,0.06);">
                    <p style="font-size:0.72rem; font-weight:700; text-transform:uppercase; letter-spacing:0.08em; color:${c.accent}; margin-bottom:0.5rem;">🛠️ Tech Stack</p>
                    <div>${techBadges}</div>
                </div>
            </div>`;
    });
}

async function generateIdeas() {
    const theme = document.getElementById('themeInput').value.trim();
    if (!theme) {
        document.getElementById('themeInput').focus();
        document.getElementById('themeInput').style.borderColor = '#f87171';
        setTimeout(() => document.getElementById('themeInput').style.borderColor = 'var(--glass-border)', 2000);
        return;
    }

    // UI: loading state
    document.getElementById('errorBanner').style.display = 'none';
    document.getElementById('btnText').style.display = 'none';
    document.getElementById('btnLoading').style.display = 'inline';
    document.getElementById('generateBtn').disabled = true;
    document.getElementById('resultsSection').style.display = 'block';
    document.getElementById('themeLabel').textContent = `— ${theme}`;
    showSkeletons();
    window.scrollTo({ top: document.getElementById('resultsSection').offsetTop - 80, behavior: 'smooth' });

    try {
        const resp = await fetch('{% url "generate_ideas" %}', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': '{{ csrf_token }}',
            },
            body: JSON.stringify({ theme })
        });
        const data = await resp.json();

        if (data.error) {
            document.getElementById('errorBanner').textContent = '⚠️ ' + data.error;
            document.getElementById('errorBanner').style.display = 'block';
            document.getElementById('ideasGrid').innerHTML = '';
        } else {
            renderIdeas(data.ideas, theme);
        }
    } catch (e) {
        document.getElementById('errorBanner').textContent = '⚠️ Network error. Please try again.';
        document.getElementById('errorBanner').style.display = 'block';
        document.getElementById('ideasGrid').innerHTML = '';
    }

    // Reset button
    document.getElementById('btnText').style.display = 'inline';
    document.getElementById('btnLoading').style.display = 'none';
    document.getElementById('generateBtn').disabled = false;
}

// Allow Enter key to trigger generation
document.getElementById('themeInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') generateIdeas();
});
</script>
{% endblock %}
