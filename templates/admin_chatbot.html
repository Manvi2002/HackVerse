<!-- Floating AdminBot Widget -->
<div id="adminbot-widget" style="position: fixed; bottom: 30px; right: 30px; z-index: 1000;">
    
    <!-- Chat Icon -->
    <button id="adminbot-toggle" style="width: 60px; height: 60px; border-radius: 50%; background: linear-gradient(135deg, #ef4444, #f59e0b); border: none; box-shadow: 0 4px 15px rgba(239,68,68,0.3); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; transition: transform 0.3s;" onclick="toggleAdminChat()">
        ⚙️
    </button>

    <!-- Chat Window -->
    <div id="adminbot-window" class="glass-card" style="display: none; position: absolute; bottom: 80px; right: 0; width: 350px; height: 480px; flex-direction: column; padding: 0; overflow: hidden; border: 1px solid #ef4444;">
        
        <!-- Header -->
        <div style="background: rgba(239,68,68,0.15); padding: 1rem; border-bottom: 1px solid var(--glass-border); display: flex; align-items: center; gap: 0.8rem;">
            <div style="font-size: 1.5rem;">⚙️</div>
            <div>
                <h4 style="margin: 0; font-size: 1rem; color: #fff;">AdminBot (Power User)</h4>
                <span style="font-size: 0.75rem; color: #fca5a5;">System Authority Enabled</span>
            </div>
            <button onclick="toggleAdminChat()" style="margin-left: auto; background: none; border: none; color: var(--text-secondary); font-size: 1.2rem; cursor: pointer;">✕</button>
        </div>

        <!-- Chat History -->
        <div id="adminbot-messages" style="flex: 1; padding: 1rem; overflow-y: auto; display: flex; flex-direction: column; gap: 1rem; font-size: 0.9rem;">
            <div class="bot-msg" style="align-self: flex-start; background: rgba(239,68,68,0.1); padding: 0.8rem 1rem; border-radius: 12px 12px 12px 0; max-width: 85%; line-height: 1.4;">
                Admin Access Granted. 🚀 I can automate:
                <br>• **Analytics**: "Users registered today", "Drop-off rate"
                <br>• **Automation**: "Generate announcement", "Show report"
                <br>• **Power Commands**: "Extend deadline", "Close registration"
            </div>
        </div>

        <!-- Input Area -->
        <div style="padding: 1rem; border-top: 1px solid var(--glass-border); background: rgba(0,0,0,0.3); display: flex; gap: 0.5rem;">
            <input type="text" id="adminbot-input" placeholder="Enter admin command..." style="flex: 1; padding: 0.6rem 1rem; border-radius: 20px; border: 1px solid var(--glass-border); background: rgba(255,255,255,0.05); color: #fff; outline: none;" onkeypress="if(event.key === 'Enter') sendAdminBotMsg()">
            <button onclick="sendAdminBotMsg()" style="background: #ef4444; border: none; width: 36px; height: 36px; border-radius: 50%; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center;">➤</button>
        </div>
    </div>
</div>

<style>
#adminbot-messages::-webkit-scrollbar { width: 6px; }
#adminbot-messages::-webkit-scrollbar-thumb { background: rgba(239,68,68,0.3); border-radius: 3px; }
.admin-user-msg {
    align-self: flex-end;
    background: #ef4444;
    color: white;
    padding: 0.8rem 1rem;
    border-radius: 12px 12px 0 12px;
    max-width: 85%;
    line-height: 1.4;
    word-wrap: break-word;
}
.admin-bot-msg {
    align-self: flex-start;
    background: rgba(239,68,68,0.1);
    padding: 0.8rem 1rem;
    border-radius: 12px 12px 12px 0;
    max-width: 85%;
    line-height: 1.4;
    white-space: pre-wrap;
    word-wrap: break-word;
}
</style>

<script>
function toggleAdminChat() {
    const win = document.getElementById('adminbot-window');
    const btn = document.getElementById('adminbot-toggle');
    if (win.style.display === 'none') {
        win.style.display = 'flex';
        btn.style.transform = 'scale(0.8)';
        document.getElementById('adminbot-input').focus();
    } else {
        win.style.display = 'none';
        btn.style.transform = 'scale(1)';
    }
}

async function sendAdminBotMsg() {
    const inputField = document.getElementById('adminbot-input');
    const msgBox = document.getElementById('adminbot-messages');
    const msg = inputField.value.trim();
    if (!msg) return;

    inputField.value = '';
    msgBox.innerHTML += `<div class="admin-user-msg">${msg}</div>`;
    msgBox.scrollTop = msgBox.scrollHeight;

    const typingId = 'typing-' + Date.now();
    msgBox.innerHTML += `
        <div id="${typingId}" class="admin-bot-msg" style="padding: 0.5rem 1rem;">
            <div class="typing-indicator"></div><div class="typing-indicator"></div><div class="typing-indicator"></div>
        </div>`;
    msgBox.scrollTop = msgBox.scrollHeight;

    try {
        const response = await fetch('/admin-chatbot/api/', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': '{{ csrf_token }}'
            },
            body: JSON.stringify({ message: msg })
        });
        const data = await response.json();
        
        document.getElementById(typingId).remove();
        
        let reply = data.reply || "Error executing admin command.";
        msgBox.innerHTML += `<div class="admin-bot-msg">${reply}</div>`;
        msgBox.scrollTop = msgBox.scrollHeight;

    } catch (e) {
        document.getElementById(typingId).remove();
        msgBox.innerHTML += `<div class="admin-bot-msg" style="color: #f87171;">System error. Failed to reach Admin Gateway.</div>`;
        msgBox.scrollTop = msgBox.scrollHeight;
    }
}
</script>
